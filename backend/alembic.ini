[alembic]
# Path to migration scripts
script_location = app/migrations

# Template to use for new revision files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for %%(year)d etc.
timezone = UTC

# Max length of slug
truncate_slug_length = 40

# Database URL — overridden by env_var in env.py
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/tribhuban

[post_write_hooks]
# No post-write hooks in MVP

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
